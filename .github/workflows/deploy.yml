name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: AtlasReaper311/atlas-infra/.github/workflows/deploy-worker.yml@main
    with:
      worker_name: atlas-notify
      run_lint: true
      run_tests: false
    secrets: inherit
