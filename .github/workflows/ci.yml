name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  notify:
    name: Report to Discord
    needs: test
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Notify success
        if: needs.test.result == 'success'
        run: |
          curl -X POST "${{ secrets.DISCORD_CICD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "username": "ci-cd",
              "embeds": [{
                "title": "CI passed: atlas-notify",
                "description": "Vitest auth-dialect suite passed on push to main.",
                "color": 4906624,
                "fields": [
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Actor", "value": "${{ github.actor }}", "inline": true}
                ],
                "footer": {"text": "Atlas Systems — Pipeline"}
              }]
            }'
      - name: Notify failure
        if: needs.test.result == 'failure'
        run: |
          curl -X POST "${{ secrets.DISCORD_CICD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "username": "ci-cd",
              "embeds": [{
                "title": "CI failed: atlas-notify",
                "description": "Vitest auth-dialect suite failed on push to main.",
                "color": 14830410,
                "fields": [
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Actor", "value": "${{ github.actor }}", "inline": true},
                  {"name": "Run", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "inline": false}
                ],
                "footer": {"text": "Atlas Systems — Pipeline"}
              }]
            }'
