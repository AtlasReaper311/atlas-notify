name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run tests
        run: npm test
      - name: Build exact Wrangler deployment candidate
        run: npx wrangler deploy --dry-run --outdir dist
      - name: Check out pinned Atlas Infra Worker contract validator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-infra
          ref: f971172dc258c93dffa53b8b7a3532c5be55883d
          path: .atlas-infra-contracts
          persist-credentials: false
      - name: Validate bundled Worker metadata contract
        run: |
          python3 .atlas-infra-contracts/scripts/worker_contract.py check \
            --bundle-dir dist \
            --require-meta

  # Dogfood: report our own CI through the reusable atlas-notify workflow
  # instead of a bespoke webhook step. Routes to #ci-cd via signal_class, and
  # the router mirrors any failure to #alerts. Pinned to the merged commit.
  notify:
    needs: test
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: AtlasReaper311/atlas-notify/.github/workflows/notify.yml@4485013d9a432d4759ce025fa9bc73aa6a2d9c7f # atlas-notify main: channel routing
    with:
      status: ${{ needs.test.result }}
      kind: ci
      signal_class: cicd
    secrets:
      NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
